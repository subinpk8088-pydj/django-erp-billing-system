{% extends 'layouts/admin_base.html' %}

{% block admin_content %}

<h2>Expense Categories</h2>

<a href="{% url 'create_expense_category' %}"
   class="btn btn-success mb-3">

    Add Category

</a>

<table class="table table-bordered">

    <tr>

        <th>ID</th>

        <th>Name</th>

    </tr>

    {% for category in categories %}

    <tr>

        <td>{{ category.id }}</td>

        <td>{{ category.name }}</td>

    </tr>

    {% endfor %}

</table>

{% endblock %}
