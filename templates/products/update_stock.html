<!-- UPDATE STOCK -->
<!-- ========================= -->

{% extends 'layouts/admin_base.html' %}

{% block admin_content %}

<div class="container-fluid py-4">

    <div class="row justify-content-center">

        <div class="col-xl-6 col-lg-7">

            <div class="stock-card overflow-hidden">

                <!-- HEADER -->

                <div class="stock-header">

                    <div class="header-overlay"></div>

                    <div class="position-relative">

                        <div class="stock-icon">

                            <i class="bi bi-box-seam-fill"></i>

                        </div>

                        <h2 class="fw-bold text-white mb-1">

                            Update Stock

                        </h2>

                        <p class="text-white-50 mb-0">

                            {{ product.name }}

                        </p>

                    </div>

                </div>



                <!-- BODY -->

                <div class="card-body p-4 p-lg-5">

                    <!-- STOCK OVERVIEW -->

                    <div class="stock-overview mb-4">

                        <div class="stock-left">

                            <span>Current Stock</span>

                            <h2>{{ product.stock }}</h2>

                        </div>

                        <div class="stock-chart">

                            <div class="chart-bar active"></div>
                            <div class="chart-bar active"></div>
                            <div class="chart-bar active"></div>
                            <div class="chart-bar active"></div>
                            <div class="chart-bar"></div>

                        </div>

                    </div>



                    <!-- QUICK STATS -->

                    <div class="row g-3 mb-4">

                        <div class="col-md-4">

                            <div class="stock-mini-card">

                                <i class="bi bi-arrow-up-circle-fill text-success"></i>

                                <h6>In Stock</h6>

                                <span>Available</span>

                            </div>

                        </div>


                        <div class="col-md-4">

                            <div class="stock-mini-card">

                                <i class="bi bi-bar-chart-fill text-primary"></i>

                                <h6>Inventory</h6>

                                <span>Tracked</span>

                            </div>

                        </div>


                        <div class="col-md-4">

                            <div class="stock-mini-card">

                                <i class="bi bi-shield-check text-warning"></i>

                                <h6>Secure</h6>

                                <span>Protected</span>

                            </div>

                        </div>

                    </div>



                    <!-- FORM -->

                    <form method="POST">

                        {% csrf_token %}

                        <div class="form-floating mb-4">

                            <input type="number"
                                   name="quantity"
                                   id="quantity"
                                   class="form-control stock-input"
                                   placeholder="Quantity"
                                   required>

                            <label for="quantity">

                                <i class="bi bi-plus-circle-fill me-2"></i>

                                Enter Quantity

                            </label>

                        </div>



                        <!-- PREVIEW -->

                        <div class="stock-preview mb-4">

                            <div class="preview-title">

                                Updated Stock Preview

                            </div>

                            <div class="preview-value">

                                <span id="previewStock">

                                    {{ product.stock }}

                                </span>

                                Units

                            </div>

                        </div>



                        <!-- BUTTONS -->

                        <div class="d-flex gap-3 flex-wrap">

                            <button type="submit"
                                    class="btn btn-primary stock-btn px-4 py-3">

                                <i class="bi bi-check-circle-fill me-2"></i>

                                Update Stock

                            </button>

                            <a href="{% url 'product_list' %}"
                               class="btn btn-light border stock-btn px-4 py-3">

                                Cancel

                            </a>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>



<style>

    .stock-card{
        background:#fff;
        border-radius:30px;
        box-shadow:0 20px 50px rgba(0,0,0,0.06);
    }

    .stock-header{
        position:relative;
        padding:3rem;
        background:linear-gradient(135deg,#111827,#1F2937);
        overflow:hidden;
    }

    .header-overlay{
        position:absolute;
        inset:0;
        background:
        radial-gradient(rgba(255,255,255,0.1) 1px, transparent 1px);
        background-size:18px 18px;
    }

    .stock-icon{
        width:76px;
        height:76px;
        border-radius:24px;
        background:rgba(255,255,255,0.14);
        backdrop-filter:blur(10px);
        color:#fff;
        font-size:1.7rem;
        display:flex;
        align-items:center;
        justify-content:center;
        margin-bottom:1.5rem;
    }

    .stock-overview{
        background:#F9FAFB;
        border-radius:24px;
        padding:1.5rem;
        display:flex;
        justify-content:space-between;
        align-items:center;
        flex-wrap:wrap;
        gap:1rem;
    }

    .stock-left span{
        color:#6B7280;
        font-size:0.8rem;
    }

    .stock-left h2{
        font-weight:700;
        margin:0;
    }

    .stock-chart{
        display:flex;
        align-items:end;
        gap:6px;
        height:50px;
    }

    .chart-bar{
        width:12px;
        height:20px;
        background:#D1D5DB;
        border-radius:6px;
    }

    .chart-bar.active{
        background:#2563EB;
    }

    .chart-bar:nth-child(1){height:18px;}
    .chart-bar:nth-child(2){height:28px;}
    .chart-bar:nth-child(3){height:36px;}
    .chart-bar:nth-child(4){height:48px;}
    .chart-bar:nth-child(5){height:24px;}

    .stock-mini-card{
        background:#F9FAFB;
        border-radius:20px;
        padding:1.2rem;
        text-align:center;
        border:1px solid #EEF2F7;
    }

    .stock-mini-card i{
        font-size:1.5rem;
        margin-bottom:0.8rem;
    }

    .stock-mini-card h6{
        margin-bottom:0.25rem;
        font-weight:700;
    }

    .stock-mini-card span{
        font-size:0.8rem;
        color:#6B7280;
    }

    .stock-input{
        height:64px;
        border-radius:18px;
        border:1px solid #E5E7EB;
    }

    .stock-input:focus{
        border-color:#2563EB;
        box-shadow:0 0 0 4px rgba(37,99,235,0.1);
    }

    .stock-preview{
        background:#EFF6FF;
        border-radius:24px;
        padding:1.5rem;
        text-align:center;
    }

    .preview-title{
        color:#2563EB;
        font-size:0.8rem;
        margin-bottom:0.8rem;
    }

    .preview-value{
        font-size:2rem;
        font-weight:700;
        color:#111827;
    }

    .stock-btn{
        border-radius:18px;
        font-weight:600;
        transition:0.3s ease;
    }

    .stock-btn:hover{
        transform:translateY(-2px);
    }

</style>

<script>

    const quantityInput =
        document.getElementById('quantity');

    const previewStock =
        document.getElementById('previewStock');

    const currentStock =
        parseInt('{{ product.stock }}');

    quantityInput.addEventListener('input', function(){

        let quantity =
            parseInt(this.value) || 0;

        previewStock.innerText =
            currentStock + quantity;

    });

</script>

{% endblock %}
