{% extends 'layouts/admin_base.html' %}

{% block admin_content %}

<h3>Update Stock - {{ product.name }}</h3>

<p>Current Stock: <strong>{{ product.stock }}</strong></p>

<form method="POST">
    {% csrf_token %}

    <input type="number" name="quantity" class="form-control mb-3"
           placeholder="Enter quantity to add" required>

    <button type="submit" class="btn btn-primary">
        Update Stock
    </button>

    <a href="{% url 'product_list' %}" class="btn btn-secondary">
        Cancel
    </a>
</form>

{% endblock %}
