{% extends 'layouts/admin_base.html' %}

{% block admin_content %}

<h2>Categories</h2>

<a href="{% url 'add_category' %}" class="btn btn-success mb-3">
    Add Category
</a>

<table class="table">
    <tr>
        <th>Name</th>
    </tr>

    {% for cat in categories %}
    <tr>
        <td>{{ cat.name }}</td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
