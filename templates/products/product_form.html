{% extends 'layouts/admin_base.html' %}

{% block admin_content %}

<div class="container-fluid py-4">

    <div class="row justify-content-center">

        <div class="col-12 col-xl-10">

            <div class="card border-0 shadow-sm rounded-4 overflow-hidden">

                <!-- HEADER -->
                <div class="card-header bg-white border-0 p-4 p-md-5">

                    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3">

                        <div>
                            <h2 class="fw-bold text-dark mb-2">
                                Add Product
                            </h2>

                            <p class="text-muted mb-0">
                                Create and manage inventory products professionally
                            </p>
                        </div>

                        <div class="bg-primary bg-opacity-10 rounded-circle d-flex align-items-center justify-content-center"
                             style="width:70px;height:70px;">

                            <i class="bi bi-box-seam text-primary fs-2"></i>

                        </div>

                    </div>

                </div>

                <!-- BODY -->
                <div class="card-body p-4 p-md-5 bg-light bg-opacity-25">

                    <form method="POST">

                        {% csrf_token %}

                        <div class="row g-4">

                            {{ form.as_p }}

                        </div>

                        <!-- BUTTONS -->
                        <div class="border-top pt-4 mt-4">

                            <div class="d-flex flex-column flex-sm-row gap-3">

                                <button type="submit"
                                        class="btn btn-primary px-4 py-3 rounded-3 fw-semibold shadow-sm">

                                    <i class="bi bi-check-circle-fill me-2"></i>
                                    Save Product

                                </button>

                                <a href="{% url 'product_list' %}"
                                   class="btn btn-outline-secondary px-4 py-3 rounded-3 fw-semibold">

                                    <i class="bi bi-arrow-left me-2"></i>
                                    Back to Products

                                </a>

                            </div>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

<!-- FORM STYLING -->
<style>

    /* FORM LABELS */
    form label{
        font-weight:600;
        color:#111827;
        margin-bottom:8px;
        display:block;
        font-size:14px;
    }

    /* INPUTS */
    form input,
    form select,
    form textarea{
        width:100%;
        border:1px solid #E5E7EB;
        border-radius:14px;
        padding:14px 16px;
        min-height:54px;
        font-size:15px;
        background:#fff;
        transition:all 0.3s ease;
        box-shadow:none;
    }

    form textarea{
        min-height:120px;
        resize:none;
    }

    /* FOCUS EFFECT */
    form input:focus,
    form select:focus,
    form textarea:focus{
        border-color:#2563EB;
        box-shadow:0 0 0 4px rgba(37,99,235,0.12);
        outline:none;
    }

    /* HELP TEXT */
    form small,
    .helptext{
        color:#6B7280;
        font-size:13px;
        margin-top:6px;
        display:block;
    }

    /* ERROR LIST */
    .errorlist{
        list-style:none;
        padding:0;
        margin:8px 0 0;
        color:#DC2626;
        font-size:13px;
    }

    /* PARAGRAPH FROM form.as_p */
    form p{
        margin-bottom:24px;
    }

    /* BUTTONS */
    .btn{
        transition:all 0.3s ease;
    }

    .btn:hover{
        transform:translateY(-2px);
    }

    /* RESPONSIVE */
    @media (max-width:768px){

        .card-body{
            padding:24px !important;
        }

        .card-header{
            padding:24px !important;
        }

        .btn{
            width:100%;
        }

    }

</style>

{% endblock %}
