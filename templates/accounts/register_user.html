{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

    <div class="card shadow p-4">

        <h3 class="mb-4">
            Create User

        <form method="POST">

            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit"

                Create User

            </button>

        </form>

    </div>

</div>

{% endblock %}
