{% extends 'layouts/admin_base.html' %}

{% block admin_content %}

<div class="container-fluid py-4">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card border-0 shadow-lg rounded-4 overflow-hidden">

                <!-- HEADER -->
                <div class="card-header bg-white border-0 p-4 p-md-5">

                    <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">

                        <div>

                            <h2 class="fw-bold mb-2">
                                Supplier Form
                            </h2>

                            <p class="text-muted mb-0">
                                Add or update supplier details
                            </p>

                        </div>

                        <div class="bg-primary bg-opacity-10 rounded-circle d-flex align-items-center justify-content-center"
                             style="width:75px;height:75px;">

                            <i class="bi bi-truck text-primary fs-2"></i>

                        </div>

                    </div>

                </div>

                <!-- BODY -->
                <div class="card-body p-4 p-md-5 bg-light bg-opacity-25">

                    <form method="POST">

                        {% csrf_token %}

                        {{ form.as_p }}

                        <div class="d-flex gap-3 mt-4 flex-wrap">

                            <button type="submit"
                                    class="btn btn-success px-4 py-3 rounded-3 shadow-sm fw-semibold">

                                <i class="bi bi-check-circle-fill me-2"></i>

                                Save Supplier

                            </button>

                            <a href="{% url 'supplier_list' %}"
                               class="btn btn-outline-secondary px-4 py-3 rounded-3 fw-semibold">

                                <i class="bi bi-arrow-left me-2"></i>

                                Back

                            </a>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

<style>

form label{
    font-weight:600;
    color:#111827;
    margin-bottom:8px;
    display:block;
    font-size:14px;
}

form input,
form textarea,
form select{
    width:100%;
    border:1px solid #E5E7EB;
    border-radius:14px;
    padding:14px 16px;
    min-height:54px;
    background:#fff;
    transition:0.3s ease;
    box-shadow:none;
}

form textarea{
    min-height:120px;
}

form input:focus,
form textarea:focus,
form select:focus{
    border-color:#2563EB;
    box-shadow:0 0 0 4px rgba(37,99,235,0.12);
    outline:none;
}

form p{
    margin-bottom:24px;
}

.btn{
    transition:0.3s ease;
}

.btn:hover{
    transform:translateY(-2px);
}

@media(max-width:768px){

    .btn{
        width:100%;
    }

}

</style>

{% endblock %}
