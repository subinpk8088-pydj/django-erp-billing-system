{% extends 'layouts/admin_base.html' %}

{% block admin_content %}

<h2>Invoices</h2>

<a href="{% url 'create_invoice' %}" class="btn btn-primary mb-3">
    Create Invoice
</a>

<table class="table">
    <tr>
        <th>ID</th>
        <th>Customer</th>
        <th>Total</th>
        <th>GST</th>
        <th>Grand Total</th>
        <th>Action</th>
    </tr>

    {% for inv in invoices %}
    <tr>
        <td>{{ inv.id }}</td>
        <td>{{ inv.customer.name }}</td>
        <td>{{ inv.total_amount }}</td>
        <td>{{ inv.gst_amount }}</td>
        <td>{{ inv.grand_total }}</td>
        <td>
    <a href="{% url 'invoice_detail' inv.id %}" class="btn btn-info btn-sm">
        View
    </a>
</td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
