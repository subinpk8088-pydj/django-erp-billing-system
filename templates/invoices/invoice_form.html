{% extends 'layouts/admin_base.html' %}

{% block admin_content %}

<h2>Create Invoice</h2>

<form method="POST">
    {% csrf_token %}

    {{ form.as_p }}

    <h4>Items</h4>

    <div id="formset-container">
        {{ formset.management_form }}

        {% for form in formset %}
        <div class="item-form border p-2 mb-2">
            {{ form.as_p }}
            <button type="button" class="btn btn-danger remove-item">Remove</button>
        </div>
        {% endfor %}
    </div>

    <button type="button" id="add-item" class="btn btn-secondary mb-3">
        Add Item
    </button>

    <br>
    <button type="submit" class="btn btn-success">Save Invoice</button>
</form>
<script>
document.getElementById('add-item').addEventListener('click', function () {
    let container = document.getElementById('formset-container');
    let forms = document.querySelectorAll('.item-form');
    let totalForms = document.getElementById('id_items-TOTAL_FORMS');

    let newForm = forms[0].cloneNode(true);

    let formIndex = forms.length;

    newForm.innerHTML = newForm.innerHTML.replace(/items-\d+/g, 'items-' + formIndex);

    container.appendChild(newForm);

    totalForms.value = formIndex + 1;
});

document.addEventListener('click', function(e) {
    if (e.target.classList.contains('remove-item')) {
        e.target.closest('.item-form').remove();

        let totalForms = document.getElementById('id_items-TOTAL_FORMS');
        totalForms.value = document.querySelectorAll('.item-form').length;
    }
});
</script>
{% endblock %}
