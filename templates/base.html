<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ERP Billing System{% endblock %}</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        /* ===== CSS VARIABLES ===== */
        :root {
            --primary:        #2563EB;
            --primary-hover:  #1D4ED8;
            --primary-light:  #EFF6FF;
            --sidebar-bg:     #111827;
            --sidebar-hover:  #1F2937;
            --sidebar-active: #1F2937;
            --success:        #16A34A;
            --danger:         #DC2626;
            --warning:        #F59E0B;
            --bg:             #F3F4F6;
            --card-bg:        #FFFFFF;
            --text-primary:   #111827;
            --text-secondary: #6B7280;
            --border:         #E5E7EB;
            --shadow-card:    0 4px 20px rgba(0,0,0,0.05);
            --shadow-sidebar: 4px 0 24px rgba(0,0,0,0.12);
            --radius-sm:      8px;
            --radius-md:      12px;
            --radius-lg:      16px;
            --topbar-h:       68px;
            --sidebar-w:      265px;
            --transition:     all 0.22s cubic-bezier(0.4,0,0.2,1);
        }

        /* ===== GLOBAL RESET ===== */
        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            font-size: 0.9rem;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        h1,h2,h3,h4,h5,h6 { font-weight: 700; color: var(--text-primary); }
        a { text-decoration: none; }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #D1D5DB; border-radius: 99px; }
        ::-webkit-scrollbar-thumb:hover { background: #9CA3AF; }

        /* ===== PAGE FADE IN ===== */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(14px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .page-content { animation: fadeInUp 0.35s ease forwards; }

        /* ===== BUTTONS ===== */
        .btn {
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            font-size: 0.85rem;
            border-radius: var(--radius-sm);
            padding: 0.45rem 1.1rem;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            letter-spacing: 0.01em;
        }
        .btn:hover { transform: translateY(-1px); }
        .btn:active { transform: translateY(0); }

        .btn-primary {
            background: var(--primary);
            border-color: var(--primary);
            color: #fff;
            box-shadow: 0 2px 8px rgba(37,99,235,0.22);
        }
        .btn-primary:hover {
            background: var(--primary-hover);
            border-color: var(--primary-hover);
            box-shadow: 0 4px 14px rgba(37,99,235,0.32);
            color: #fff;
        }

        .btn-outline-primary {
            color: var(--primary);
            border-color: var(--primary);
        }
        .btn-outline-primary:hover {
            background: var(--primary);
            border-color: var(--primary);
            box-shadow: 0 4px 14px rgba(37,99,235,0.22);
        }

        .btn-danger {
            background: var(--danger);
            border-color: var(--danger);
            box-shadow: 0 2px 8px rgba(220,38,38,0.2);
        }
        .btn-danger:hover {
            background: #B91C1C;
            border-color: #B91C1C;
            box-shadow: 0 4px 14px rgba(220,38,38,0.3);
        }

        .btn-success {
            background: var(--success);
            border-color: var(--success);
            box-shadow: 0 2px 8px rgba(22,163,74,0.2);
        }
        .btn-success:hover {
            background: #15803D;
            border-color: #15803D;
        }

        .btn-warning {
            background: var(--warning);
            border-color: var(--warning);
            color: #fff;
        }
        .btn-warning:hover {
            background: #D97706;
            border-color: #D97706;
            color: #fff;
        }

        .btn-sm {
            font-size: 0.78rem;
            padding: 0.3rem 0.75rem;
            border-radius: 6px;
        }

        /* ===== CARDS ===== */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-card);
            transition: var(--transition);
        }
        .card:hover { box-shadow: 0 8px 30px rgba(0,0,0,0.09); }
        .card-header {
            background: transparent;
            border-bottom: 1px solid var(--border);
            padding: 1.1rem 1.4rem;
            font-weight: 600;
            font-size: 0.92rem;
            color: var(--text-primary);
        }
        .card-body { padding: 1.4rem; }

        /* ===== STAT CARDS ===== */
        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            box-shadow: var(--shadow-card);
            transition: var(--transition);
            position: relative;
            overflow: hidden;
            height: 100%;
        }
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 4px; height: 100%;
            border-radius: 0 2px 2px 0;
        }
        .stat-card.primary::before  { background: var(--primary); }
        .stat-card.success::before  { background: var(--success); }
        .stat-card.warning::before  { background: var(--warning); }
        .stat-card.danger::before   { background: var(--danger); }

        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 36px rgba(0,0,0,0.1);
        }
        .stat-icon {
            width: 52px; height: 52px;
            border-radius: var(--radius-md);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem;
        }
        .stat-icon.primary { background: var(--primary-light); color: var(--primary); }
        .stat-icon.success { background: #F0FDF4; color: var(--success); }
        .stat-icon.warning { background: #FFFBEB; color: var(--warning); }
        .stat-icon.danger  { background: #FEF2F2; color: var(--danger); }

        .stat-label {
            font-size: 0.78rem;
            font-weight: 500;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 0.3rem;
        }
        .stat-value {
            font-size: 1.75rem;
            font-weight: 800;
            color: var(--text-primary);
            line-height: 1.1;
        }
        .stat-sub {
            font-size: 0.78rem;
            color: var(--text-secondary);
            margin-top: 0.4rem;
        }

        /* ===== TABLES ===== */
        .erp-table-wrap {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-card);
            overflow: hidden;
        }
        .erp-table-wrap .table-toolbar {
            padding: 1rem 1.25rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex-wrap: wrap;
        }
        .table-responsive { overflow-x: auto; }
        .erp-table { margin-bottom: 0; font-size: 0.865rem; }
        .erp-table thead th {
            background: #F9FAFB;
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            border-bottom: 2px solid var(--border);
            border-top: none;
            padding: 0.85rem 1rem;
            white-space: nowrap;
            position: sticky; top: 0; z-index: 1;
        }
        .erp-table tbody td {
            padding: 0.85rem 1rem;
            border-color: var(--border);
            vertical-align: middle;
            color: var(--text-primary);
        }
        .erp-table tbody tr:hover { background: #F8FAFF; }
        .erp-table tbody tr:last-child td { border-bottom: none; }

        /* ===== BADGES ===== */
        .badge {
            font-weight: 500;
            font-size: 0.72rem;
            padding: 0.32em 0.65em;
            border-radius: 6px;
            letter-spacing: 0.02em;
        }
        .badge-status-paid    { background:#F0FDF4; color:#16A34A; border:1px solid #BBF7D0; }
        .badge-status-pending { background:#FFFBEB; color:#D97706; border:1px solid #FDE68A; }
        .badge-status-overdue { background:#FEF2F2; color:#DC2626; border:1px solid #FECACA; }

        /* ===== FORMS ===== */
        .form-label {
            font-weight: 500;
            font-size: 0.83rem;
            color: var(--text-primary);
            margin-bottom: 0.35rem;
        }
        .form-control, .form-select {
            font-family: 'Inter', sans-serif;
            font-size: 0.875rem;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 0.5rem 0.85rem;
            color: var(--text-primary);
            background: #FAFAFA;
            transition: var(--transition);
        }
        .form-control:focus, .form-select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
            background: #fff;
            outline: none;
        }
        .form-control::placeholder { color: #B0B7C3; }
        .form-control.is-invalid { border-color: var(--danger); }
        .form-control.is-valid   { border-color: var(--success); }
        .invalid-feedback { font-size: 0.78rem; }

        /* Search input */
        .search-wrap { position: relative; }
        .search-wrap .bi-search {
            position: absolute; left: 0.75rem; top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary); font-size: 0.85rem;
        }
        .search-wrap .form-control { padding-left: 2.1rem; }

        /* ===== ALERTS ===== */
        .alert {
            border-radius: var(--radius-md);
            border: none;
            font-size: 0.875rem;
            font-weight: 500;
            padding: 0.85rem 1.1rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }
        .alert-success { background: #F0FDF4; color: #15803D; }
        .alert-danger  { background: #FEF2F2; color: #B91C1C; }
        .alert-warning { background: #FFFBEB; color: #B45309; }
        .alert-info    { background: var(--primary-light); color: #1D4ED8; }

        /* ===== PAGINATION ===== */
        .pagination .page-link {
            font-family: 'Inter', sans-serif;
            font-size: 0.82rem;
            font-weight: 500;
            color: var(--text-secondary);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm) !important;
            margin: 0 2px;
            padding: 0.4rem 0.75rem;
            transition: var(--transition);
        }
        .pagination .page-link:hover { background: var(--primary-light); color: var(--primary); border-color: var(--primary); }
        .pagination .page-item.active .page-link {
            background: var(--primary);
            border-color: var(--primary);
            color: #fff;
            box-shadow: 0 2px 8px rgba(37,99,235,0.3);
        }

        /* ===== SECTION HEADER ===== */
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 0.75rem;
        }
        .section-header h5 {
            font-size: 1.05rem;
            font-weight: 700;
            margin: 0;
            color: var(--text-primary);
        }
        .section-header .subtitle {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 0.1rem;
        }

        /* ===== TOPBAR ===== */
        .erp-topbar {
            height: var(--topbar-h);
            background: var(--card-bg);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1.75rem;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 1px 0 var(--border), 0 2px 8px rgba(0,0,0,0.04);
        }

        /* ===== RESPONSIVE MOBILE ===== */
        @media (max-width: 768px) {
            .btn { width: 100%; justify-content: center; }
            .section-header { flex-direction: column; align-items: flex-start; }
            .stat-value { font-size: 1.4rem; }
        }
    </style>

    {% block extra_css %}{% endblock %}
</head>
<body>

    {% block content %}
        {% if messages %}
            <div class="container mt-3">
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                        <i class="bi bi-info-circle-fill"></i>
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                {% endfor %}
            </div>
        {% endif %}
    {% endblock %}

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
