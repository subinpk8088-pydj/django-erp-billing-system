<!-- ========================= -->

{% extends 'layouts/admin_base.html' %}

{% block admin_content %}

<div class="container-fluid py-5">

    <div class="row justify-content-center">

        <div class="col-lg-5">

            <div class="card border-0 shadow-sm rounded-4 overflow-hidden">

                <div class="card-body p-5 text-center">

                    <div class="mb-4">

                        <div class="bg-danger bg-opacity-10 rounded-circle d-inline-flex align-items-center justify-content-center"
                             style="width:90px;height:90px;">

                            <i class="bi bi-trash-fill text-danger fs-1"></i>

                        </div>

                    </div>

                    <h2 class="fw-bold mb-3">
                        Delete Purchase
                    </h2>

                    <p class="text-muted mb-4">

                        Are you sure you want to delete purchase invoice

                        <strong>
                            {{ purchase.invoice_number }}
                        </strong> ?

                    </p>

                    <form method="POST">

                        {% csrf_token %}

                        <div class="d-flex justify-content-center gap-3 flex-wrap">

                            <button type="submit"
                                    class="btn btn-danger px-4 py-3 rounded-3 fw-semibold">

                                <i class="bi bi-trash me-2"></i>
                                Delete Purchase

                            </button>

                            <a href="{% url 'purchase_list' %}"
                               class="btn btn-outline-secondary px-4 py-3 rounded-3 fw-semibold">

                                Cancel

                            </a>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
